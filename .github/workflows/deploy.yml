name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies & Build
        working-directory: ./jaco
        run: |
          pnpm install
          pnpm generate

      - name: Check Build Output
        run: |
          echo "Checking directory: ./jaco/.output/public"
          ls -la ./jaco/.output/public
          # Wenn hier ein Fehler kommt, ist der Pfad in publish_dir falsch!

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./jaco/.output/public
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'Deploy to GitHub Pages'